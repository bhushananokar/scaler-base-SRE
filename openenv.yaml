spec_version: 1
name: incident_response_env
display_name: "AI-Powered Incident Response Triage"
description: >
  A multi-task SRE simulation environment where AI agents triage, diagnose,
  and resolve production incidents. Five tasks of increasing difficulty:
  OOM heap exhaustion, bad deployment rollback, cascading DB connection
  leak, TLS certificate CN mismatch (config drift), and alert storm from
  a consumer deadlock. Features an 8-dimensional reward system with per-step
  signals, live-evolving metrics, SLA clocks, anti-pattern penalties, an
  Epistemic Bayesian Reward Signal (D7) that scores entropy reduction over
  root cause hypotheses, and an SRE Workflow Coherence Machine (D8) that
  rewards methodical phase progression through OBSERVE→HYPOTHESIZE→DIAGNOSE→REMEDIATE→VERIFY.
type: space
runtime: fastapi
app: server.app:app
port: 8000

tasks:
  - id: 1
    name: oom-incident
    description: "SEV2 - payment-service OOM heap exhaustion. Restart the correct service."
    difficulty: easy
    max_steps: 15

  - id: 2
    name: bad-deploy-incident
    description: "SEV2 - api-gateway bad deploy causes NullPointerException. Identify and rollback."
    difficulty: medium
    max_steps: 15

  - id: 3
    name: cascade-incident
    description: "SEV1 - order-service connection leak exhausts shared db-pool, 3 services down."
    difficulty: hard
    max_steps: 15

  - id: 4
    name: config-drift-incident
    description: "SEV2 - TLS cert CN mismatch: payments-gateway cert rotated, checkout-service config stale."
    difficulty: medium-hard
    max_steps: 15

  - id: 5
    name: alert-storm-incident
    description: "SEV1 - 11 alerts: notification-service v2.8.0 deadlock fills message-queue; 4 producers back up."
    difficulty: hard
    max_steps: 20

action_space:
  type: object
  required: [tool]
  properties:
    tool:
      type: string
      enum:
        - list_alerts
        - query_logs
        - query_metrics
        - read_runbook
        - check_deploy_history
        - execute_remediation
        - update_status
        - declare_resolved
    service:     {type: string}
    severity:    {type: string}
    keyword:     {type: string}
    metric:      {type: string}
    topic:       {type: string}
    action_type: {type: string}
    target:      {type: string}
    message:     {type: string}
    root_cause:  {type: string}

observation_space:
  type: object
  properties:
    content:               {type: string}
    task_id:               {type: integer}
    step_count:            {type: integer}
    workflow_phase:        {type: string, nullable: true,
                            description: "Current SRE investigation phase: OBSERVE | HYPOTHESIZE | DIAGNOSE | REMEDIATE | VERIFY"}
    epistemic_confidence:  {type: number, nullable: true,
                            description: "Probability mass on top root cause hypothesis (0.0–1.0). Remediate when >= 0.65."}

reward_range: [0.001, 0.999]

reward_dimensions:
  - name: situational_awareness
    description: "Alert acknowledgement, blast radius mapping, investigation depth"
  - name: diagnostic_quality
    description: "Root cause identification, efficiency, red-herring resistance"
  - name: remediation_quality
    description: "Action correctness, ordering constraints, fix verification"
  - name: time_efficiency
    description: "MTTD/MTTR - live metrics degrade each step"
  - name: communication
    description: "Status update cadence and resolution accuracy"
  - name: anti_patterns
    description: "Penalties for blind remediations, circular queries, wrong-service actions"
  - name: epistemic_quality
    description: "Bayesian belief entropy reduction over root cause hypotheses per investigation step — rewards actions that sharpen uncertainty most efficiently"
  - name: workflow_coherence
    description: "SRE Workflow Coherence Machine — rewards adherence to OBSERVE→HYPOTHESIZE→DIAGNOSE→REMEDIATE→VERIFY phase sequence"
